services:
  scanfor-red:
    build: .
    image: scanfor-red-alerts:latest
    container_name: scanfor-red
    ports:
      - "9000:9000"
    environment:
      SCANFOR_PROM_FILE_PATH: /prom
      SCANFOR_DB_PATH: /data/scanfor_red.db
      SCANFOR_PROM_POLL_SECONDS: "60"
      SCANFOR_ENABLE_PROM_WATCHER: "false"
    volumes:
      # Bind-mount the .prom source folder read-only.
      # Override SCANFOR_PROM_SOURCE to point at a different source folder.
      - ${SCANFOR_PROM_SOURCE:-C:/Users/brand/OneDrive/Documents/test_data}:/prom:ro
      # Persist the SQLite database across container restarts.
      - scanfor-db:/data
    restart: unless-stopped

volumes:
  scanfor-db:
